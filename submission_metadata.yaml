ai_usage_summary: |
  Used Claude for:
  - Algorithm design and scoring logic
  - Code structure and best practices
  - Debugging and optimization
  
  No candidate data was shared with Claude.
  Code is my original work using AI as a tool.

methodology_summary: |
  Five-component ranking system for Senior AI Engineer role:
  
  1. Title Match (30%): Exact/related titles in career history
     ("AI Engineer", "ML Engineer", "Senior Engineer")
  
  2. Skills Match (25%): Required ML/Python/Deep Learning skills
     with proficiency level, duration multiplier, endorsement bonus
  
  3. Experience Years (20%): Linear scaling for 5-9 year preference
  
  4. Education Tier (10%): Institution prestige (Tier 1 preferred)
  
  5. Behavioral Signals (15%): Profile completeness, recruiter response
     rate, search appearance, open to work flag
  
  Honeypot Detection: Filters impossible profiles (>50 expert skills,
  perfect metrics, impossible dates). Tie-breaking by candidate_id.
  Verified 0 honeypots in top 100 (0.0% rate, well below 10% threshold).
  
  Runtime: ~12 seconds for 100,000 candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
